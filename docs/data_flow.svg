<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500">
  <style>
    .box { fill:#fffaf0; stroke:#805ad5; stroke-width:2; rx:6; }
    .title { font: bold 16px sans-serif; fill:#3c366b; }
    .text { font: 12px sans-serif; fill:#2d3748; }
    .arrow { stroke:#2d3748; stroke-width:2; fill:none; marker-end:url(#a); }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3748" />
    </marker>
  </defs>
  <!-- User -->
  <rect x="40" y="40" width="160" height="80" class="box" />
  <text x="120" y="70" text-anchor="middle" class="title">User</text>
  <text x="120" y="95" text-anchor="middle" class="text">Browser / Client</text>

  <!-- Frontend -->
  <rect x="260" y="40" width="180" height="80" class="box" />
  <text x="350" y="70" text-anchor="middle" class="title">Frontend</text>
  <text x="350" y="95" text-anchor="middle" class="text">Next.js UI</text>

  <!-- API -->
  <rect x="520" y="40" width="160" height="80" class="box" />
  <text x="600" y="70" text-anchor="middle" class="title">API / Services</text>
  <text x="600" y="95" text-anchor="middle" class="text">AI, Graph, Memory</text>

  <!-- Models -->
  <rect x="740" y="40" width="200" height="120" class="box" />
  <text x="840" y="70" text-anchor="middle" class="title">Models & Storage</text>
  <text x="840" y="95" text-anchor="middle" class="text">NPC, World, state.json</text>

  <!-- Arrows -->
  <path d="M200 80 L260 80" class="arrow" />
  <path d="M440 80 L520 80" class="arrow" />
  <path d="M680 80 L740 80" class="arrow" />

  <!-- Feedback loop -->
  <path d="M840 160 C760 240, 420 240, 320 160" class="arrow" />
  <text x="580" y="230" class="text">Model updates & memory writes</text>

  <!-- Notes -->
  <text x="40" y="260" class="text">Data flow: user → frontend → API → models → state (and back via responses)</text>
</svg>
